# AI-DLC プロジェクト設定
# 生成日: 2026-03-28

starter_kit_version = "2.5.1"

[project]
name = "jailrun"
description = "Security wrapper for AI coding agents — credential isolation + OS sandbox"
type = "cli"
# starter_kit_repo: スターターキットのリポジトリパス（フォーク時に変更）
# - デフォルト: "ghq:github.com/ikeisuke/ai-dlc-starter-kit"
# - ghq形式のパス（例: "ghq:github.com/your-org/your-fork"）
# starter_kit_repo = "ghq:github.com/ikeisuke/ai-dlc-starter-kit"

[project.tech_stack]
languages = ["Shell", "Python"]
frameworks = []
tools = ["Claude Code"]

[paths]
# セットアッププロンプトのパス（詳細は 7.2.1 参照）
setup_prompt = "ghq:github.com/ikeisuke/ai-dlc-starter-kit/skills/aidlc/SKILL.md"
aidlc_dir = "docs/aidlc"
cycles_dir = "docs/cycles"

[rules]
# 開発ルール

[rules.coding]
naming_convention = "kebab-case"
# 追加のコーディングルールはここに記載

[rules.security]
validate_user_input = true
use_env_for_secrets = true

[rules.git]
ai_author = "Claude <noreply@anthropic.com>"
# Git運用ルール
commit_on_unit_complete = true
commit_on_phase_complete = true
branch_mode = "branch"
unit_branch_enabled = false
squash_enabled = true
merge_method = "merge"
draft_pr = "always"
ai_author_auto_detect = true

[rules.documentation]
language = "日本語"

[rules.reviewing]
# AIレビュー設定
# mode: "recommend" | "required" | "disabled"
# - recommend: AIレビューツール利用可能時にレビューを推奨（デフォルト）
# - required: AIレビューツール利用可能時にレビュー必須
# - disabled: レビュー推奨を無効化
mode = "recommend"
# tools: AIレビューに使用するツールの優先順位リスト
# - デフォルト: ["codex"]
# - 例: ["codex", "claude", "gemini"]
# - リスト先頭を優先ツールヒントとしてスキルに渡す（最終選択はスキル内部の責務）
tools = ["codex"]
# exclude_patterns: レビュー対象から除外するファイルパターン（配列）
# - デフォルトパターン(.env*, *.key, *.pem, credentials.*, *secret*)は常に適用
# - ここに追加のパターンを指定可能
exclude_patterns = []
codex_bot_account = "chatgpt-codex-connector[bot]"

[rules.worktree]
# git worktree設定
# enabled: true | false
# - true: サイクル開始時にworktreeの使用を提案する
# - false: 提案しない（デフォルト）
enabled = false

[rules.linting]
# markdownlint設定（v1.8.0で追加）
# markdown_lint: true | false
# - true: markdownlint を実行する
# - false: markdownlint をスキップする（デフォルト）
enabled = false
command = "npx markdownlint-cli2"

[rules.feedback]
# フィードバック送信機能設定（v1.13.3で追加）
# enabled: true | false
# - true: フィードバック送信機能を有効化（デフォルト）
# - false: フィードバック送信機能を無効化（企業利用時のセキュリティ対策）
enabled = true
upstream_repo = "ikeisuke/ai-dlc-starter-kit"

[rules.automation]
# 自動化設定（v1.18.0で追加）
# mode: "manual" | "semi_auto"
# - manual: 従来どおりすべての承認ポイントでユーザー確認（デフォルト）
# - semi_auto: AIレビュー合格時にユーザー承認を省略し自動遷移
mode = "semi_auto"

[rules.custom]
# プロジェクト固有のカスタムルール
# 必要に応じて追記してください

[inception]
# Inception Phase設定

# [rules.backlog] は v2.0.3 で廃止（DEPRECATED）。バックログは GitHub Issue 固定で
# 設定は無視されるため、本セクションは削除済み。
# 参照: skills/aidlc/guides/backlog-management.md / scripts/resolve-backlog-mode.sh

[rules.release]
# リリース設定（v2.1.6で追加）
# changelog: true | false - CHANGELOG自動更新（デフォルト: false）
# version_tag: true | false - gitタグ作成（デフォルト: false）
# v0.3.5: HISTORY.md と CHANGELOG.md の二重化リスク回避のため false に戻す
# （v0.3.4 振り返り Issue #70 問題 5 / B-staged 方針）。v0.4.0 で
# HISTORY.md → CHANGELOG.md 段階移行 Unit を計画後、再度 true 化を検討する。
changelog = false
version_tag = true

[rules.depth_level]
# 成果物詳細度設定（v1.19.0で追加）
# level: "minimal" | "standard" | "comprehensive"
level = "standard"
history_level = ""

[rules.construction]
# Construction Phase設定（v2.0.0で追加）
# max_retry: Self-Healingループの最大リトライ回数（デフォルト: 3）
max_retry = 3

[rules.cycle]
# サイクル設定（v2.1.6で追加）
# mode: "default"
# git_tracked: true | false - cyclesをgit管理するか（デフォルト: true）
# jailrun は .aidlc/cycles/ を .gitignore で除外する恒久方針（.aidlc/rules.md 参照）
mode = "default"
git_tracked = false

[rules.version_check]
# バージョンチェック設定（v2.1.4でupgrade_checkからリネーム）
# enabled: true | false（デフォルト: true）
enabled = true

[rules.github]
# GitHub 連携設定（v2.4.0で追加 / Unit 008 / #597 Unit G）
# milestone_enabled: true | false - GitHub Milestone 自動作成 / 紐付け / close を有効にするか（既定: false）
# - true: Inception Phase で自動作成、Operations Phase で自動 close
# - false: Milestone 関連ステップを全てスキップ（後方互換性確保のため既定は false）
milestone_enabled = true

[rules.retrospective]
# サイクル振り返りのフィードバック処理モード（v2.5.0で追加）
# 許容値: "silent" / "mirror" / "disabled"
feedback_mode = "mirror"
# 1サイクルあたりの最大フィードバック件数（v2.5.1で追加、デフォルト: 3）
feedback_max_per_cycle = 3
